services:
  - type: web
    name: navohub-bot
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      mkdir -p data
      mkdir -p scripts
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: 8080
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: navohub-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
