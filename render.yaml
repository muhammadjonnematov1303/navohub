services:
  - type: web
    name: navohub-bot
    env: python
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
